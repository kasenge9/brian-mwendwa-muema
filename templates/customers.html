{% extends 'base.html' %}
{% block content %}
<h2>Customers</h2>
<table class="panel table"><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th></tr></thead><tbody>{% for c in customers %}<tr><td>{{ c.id }}</td><td>{{ c.full_name }}</td><td>{{ c.phone }}</td><td>{{ c.email or '-' }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
