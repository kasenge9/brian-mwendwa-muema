{% extends 'base.html' %}
{% block content %}
<h2>Trips & Routes</h2>
<form method="post" class="panel form-grid">
  <input name="route_from" placeholder="From" required>
  <input name="route_to" placeholder="To" required>
  <input type="date" name="travel_date" required>
  <input type="time" name="departure_time" required>
  <input type="number" min="0" step="0.01" name="price" placeholder="Price" required>
  <button type="submit">Add Trip</button>
</form>
<table class="panel table">
  <thead><tr><th>ID</th><th>Route</th><th>Date</th><th>Time</th><th>Price</th><th>Status</th><th>Action</th></tr></thead>
  <tbody>
    {% for trip in trips %}
    <tr>
      <td>{{ trip.id }}</td><td>{{ trip.route_from }} → {{ trip.route_to }}</td><td>{{ trip.travel_date }}</td><td>{{ trip.departure_time }}</td>
      <td>{{ trip.price }}</td><td>{{ trip.status }}</td>
      <td><a href="{{ url_for('trips', toggle=trip.id) }}">Toggle Status</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
